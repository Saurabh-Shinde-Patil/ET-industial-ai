version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:6.0
    container_name: industrial_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: et_industrial_ai
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Node.js API Gateway Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: industrial_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/et_industrial_ai
      AI_SERVICE_URL: http://ai_service:8000
    depends_on:
      mongo:
        condition: service_healthy
      ai_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Python FastAPI AI Microservice
  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: industrial_ai_service
    restart: always
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      ENV: production
      EMBEDDING_MODEL_NAME: sentence-transformers/all-mpnet-base-v2
    volumes:
      - ai_vector_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # React Vite Frontend (Nginx Production Serve)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: industrial_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
  ai_vector_data:
