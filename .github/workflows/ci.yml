name: Industrial AI CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  frontend-build:
    name: Build & Verify Frontend (React + Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build

  backend-verify:
    name: Verify Backend Gateway (Node.js Express)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci
      - name: Verify Server Entry Point Syntax
        run: |
          cd backend
          node -c server.js

  ai-service-verify:
    name: Verify AI Microservice (Python FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Python Dependencies
        run: |
          cd ai_service
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Verify FastAPI App Load
        run: |
          cd ai_service
          python -c "from main import app; print('FastAPI microservice app validated successfully')"

  docker-compose-check:
    name: Docker Stack Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose Build
        run: docker compose build
