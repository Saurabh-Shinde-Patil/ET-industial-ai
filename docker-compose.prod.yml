version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: industrial_mongo_prod
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongodb_prod_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    container_name: industrial_ai_service_prod
    restart: always
    ports:
      - '8000:8000'
    volumes:
      - ai_vector_data:/app/app/data
    environment:
      - PROJECT_NAME=Industrial Knowledge Intelligence AI Microservice
      - VERSION=1.0.0
      - LOG_LEVEL=INFO

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: industrial_backend_prod
    restart: always
    ports:
      - '5000:5000'
    depends_on:
      mongo:
        condition: service_healthy
      ai_service:
        condition: service_started
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/et_industrial_ai
      - JWT_SECRET=industrial_production_jwt_super_secret_key_2026
      - AI_SERVICE_URL=http://ai_service:8000
    volumes:
      - uploaded_documents:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: industrial_frontend_prod
    restart: always

  nginx:
    image: nginx:alpine
    container_name: industrial_nginx_proxy
    restart: always
    ports:
      - '80:80'
    depends_on:
      - frontend
      - backend
      - ai_service
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongodb_prod_data:
  ai_vector_data:
  uploaded_documents:
